version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-booking}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-booking123}
      POSTGRES_DB: ${DB_NAME:-booking}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-booking}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (with integrated Telegram Bot and Miniapp)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: booking-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-booking}:${DB_PASSWORD:-booking123}@postgres:5432/${DB_NAME:-booking}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL}
      BACKEND_URL: ${BACKEND_URL}
      BUSINESS_ID: ${BUSINESS_ID}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    command: >
      sh -c "npx prisma migrate deploy && npm start"

volumes:
  postgres_data:
